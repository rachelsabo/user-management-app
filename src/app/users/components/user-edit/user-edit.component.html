<mat-card class="user-edit-card">
  <mat-card-header>
    <mat-card-title>
      <span class="title-icon material-icons">person</span>
      <span>Edit user</span>
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="user-edit-form">
      <div class="form-grid">
        <!-- Email -->
        <mat-form-field
          appearance="outline"
          [class.has-error]="email.invalid && (email.dirty || email.touched)"
        >
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error *ngIf="email.hasError('required')">
            Email is required.
          </mat-error>
          <mat-error *ngIf="email.hasError('email') && !email.hasError('required')">
            Please enter a valid email address.
          </mat-error>
        </mat-form-field>

        <!-- Username -->
        <mat-form-field
          appearance="outline"
          [class.has-error]="username.invalid && (username.dirty || username.touched)"
        >
          <mat-label>Username</mat-label>
          <input matInput type="text" formControlName="username" />
          <mat-error *ngIf="username.hasError('required')">
            Username is required.
          </mat-error>
          <mat-error *ngIf="username.hasError('pattern') && !username.hasError('required')">
            Username must be at least 3 characters with no spaces.
          </mat-error>
          <mat-error *ngIf="username.hasError('forbiddenUsername')">
            Username "admin" is not allowed.
          </mat-error>
        </mat-form-field>

        <!-- Age -->
        <mat-form-field
          appearance="outline"
          [class.has-error]="age.invalid && (age.dirty || age.touched)"
        >
          <mat-label>Age</mat-label>
          <input matInput type="number" formControlName="age" />
          <mat-error *ngIf="age.hasError('required')">
            Age is required.
          </mat-error>
          <mat-error *ngIf="age.hasError('min')">
            Age must be at least 18.
          </mat-error>
          <mat-error *ngIf="age.hasError('max')">
            Age must be at most 100.
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="form.invalid"
        >
          Save changes
        </button>

        <button mat-button type="button" routerLink="/users">
          Cancel
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
